name: Integration Tests

# Boots the deterministic Monero regtest stack (docker-compose.yml), seeds the
# chain (tests/integration/seed-monero-regtest-chain.php), then runs the
# `integration` and `integration-mutating` PHPUnit suites.
#
# @see INTEGRATION_TEST_PLAN.md

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:

      - name: Git checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath
          coverage: none

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Start Monero regtest containers
        run: docker compose up -d --wait --quiet-pull

      - name: Seed the deterministic regtest chain
        run: php tests/integration/seed-monero-regtest-chain.php

      - name: Run integration test suite (read-only)
        run: vendor/bin/phpunit --testsuite integration
        env:
          MONERO_INTEGRATION_TESTS: '1'

      - name: Run integration test suite (mutating state)
        run: vendor/bin/phpunit --testsuite integration-mutating
        env:
          MONERO_INTEGRATION_TESTS: '1'

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down containers
        if: always()
        run: docker compose down -v
