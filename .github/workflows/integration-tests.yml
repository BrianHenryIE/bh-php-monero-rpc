name: Integration Tests

# Boots the deterministic Monero regtest stack (docker-compose.yml) and runs the
# integration suites. Each suite runs in its OWN parallel job (up -> seed -> one suite ->
# down) rather than serially in a single job: the full serial cycle had grown close to
# ~10 minutes (seeding ~120 regtest blocks dominates, and the mutating suite mines heavily),
# so splitting keeps wall-clock to roughly one seed + the slowest suite while isolating
# failures. The `integration-destructive` suite MUST run alone — it stops the sacrificial
# containers — and needs no seeded chain.
#
# @see INTEGRATION_TEST_PLAN.md
# @see TYPED_RESPONSES_AND_FULL_INTEGRATION_COVERAGE_PLAN.md (Phase 7)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: integration
            seed: true
          - suite: integration-mutating
            seed: true
          - suite: integration-destructive
            seed: false

    name: ${{ matrix.suite }}

    steps:

      - name: Git checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath
          coverage: none

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Start Monero regtest containers
        run: docker compose up -d --wait --quiet-pull

      - name: Seed the deterministic regtest chain
        if: ${{ matrix.seed }}
        run: php tests/integration/seed-monero-regtest-chain.php

      - name: Run ${{ matrix.suite }} suite
        run: vendor/bin/phpunit --testsuite ${{ matrix.suite }}
        env:
          MONERO_INTEGRATION_TESTS: '1'

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down containers
        if: always()
        run: docker compose down -v
